<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
   <meta name="author" content="zahra NM">
   <meta name="keywords" content="HTML,CSS,JavaScript">
   <meta name="description" content="a calculator web app">
   <meta property="og:image" content="https://res.cloudinary.com/dz209s6jk/image/upload/v1652199545/Challenges/xye51b9no1nkpuonov8r.jpg">
     <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Calculator app</title>
    <link rel="stylesheet" href="./style.css" />
    <script defer type="module" src="./main.js"></script>
  </head>
  <body class="style-1">
    <div class="main style-1">
      <header>
        <section class="wrapper-top">
          <h3>
             calc 
          </h3>
          <div class="text-sm container-theme">
            <h5>THEME</h5>
            <div>
              <div>
                <div class="container-theme-num">
                  <small>1</small>
                  <small>2</small>
                  <small>3</small>
                </div>
                <div class="btn-theme container-theme-control">
                  <input type="range" min="2" max="12" step="5" value="2" />
                </div>
              </div>
            </div>
          </div>
        </section>
      </header>
      <main>
        <section>
          <div class="container-show-result rouned-sm">
            <h2 class="show-result"></h2>
          </div>
        </section>
        <section class="wrapper-calc rouned-sm">
          <button class="btn-key" data-value="7">7</button>
          <button class="btn-key" data-value="8">8</button>
          <button class="btn-key" data-value="9">9</button>
          <button class="btn-hover btn-del">DEL</button>
          <button class="btn-key" data-value="4">4</button>
          <button class="btn-key" data-value="5">5</button>
          <button class="btn-key" data-value="6">6</button>
          <button class="btn-key btn-sign no-allow" data-value="+">+</button>
          <button class="btn-key" data-value="1">1</button>
          <button class="btn-key" data-value="2">2</button>
          <button class="btn-key" data-value="3">3</button>
          <button class="btn-key btn-sign no-allow" data-value="-">-</button>
          <button class="btn-key" data-value=".">.</button>
          <button class="btn-key" data-value="0">0</button>
          <button class="btn-key btn-sign no-allow" data-value="/">/</button>
          <button class="btn-key btn-sign no-allow" data-value="*">x</button>
          <button class="btn-hover btn-reset">RESET</button>
          <button class="btn-equel btn-hover">
            =
            <div class="format">
              <p>Invalid format used</p>
            </div>
          </button>
        </section>
      </main>
    </div>
  
  </body>
</html>
